<script>
// ============================================================
// DATA LAYER – localStorage wrapper (easy to swap for backend)
// ============================================================
const DB = {
  get(key, fallback = null) {
    try { const v = localStorage.getItem('sl_' + key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  },
  set(key, value) { localStorage.setItem('sl_' + key, JSON.stringify(value)); },
  remove(key) { localStorage.removeItem('sl_' + key); },

  // Config
  getConfig() { return this.get('config', null); },
  setConfig(cfg) { this.set('config', cfg); },

  // Trainers
  getTrainers() { return this.get('trainers', []); },
  setTrainers(t) { this.set('trainers', t); },
  getTrainer(id) { return this.getTrainers().find(t => t.id === id) || null; },
  addTrainer(t) { const arr = this.getTrainers(); arr.push(t); this.setTrainers(arr); },
  updateTrainer(id, data) {
    const arr = this.getTrainers().map(t => t.id === id ? { ...t, ...data } : t);
    this.setTrainers(arr);
  },
  deleteTrainer(id) { this.setTrainers(this.getTrainers().filter(t => t.id !== id)); },

  // Entries
  getEntries() { return this.get('entries', []); },
  setEntries(e) { this.set('entries', e); },
  getEntriesForTrainer(tid) { return this.getEntries().filter(e => e.trainerId === tid); },
  addEntry(e) { const arr = this.getEntries(); arr.push(e); this.setEntries(arr); },
  updateEntry(id, data) {
    const arr = this.getEntries().map(e => e.id === id ? { ...e, ...data } : e);
    this.setEntries(arr);
  },
  deleteEntry(id) { this.setEntries(this.getEntries().filter(e => e.id !== id)); },

  // Closed months per trainer: { trainerId_YYYY-MM: true }
  getClosedMonths() { return this.get('closedMonths', {}); },
  closeMonth(trainerId, ym) {
    const m = this.getClosedMonths();
    m[`${trainerId}_${ym}`] = true;
    this.set('closedMonths', m);
  },
  isMonthClosed(trainerId, ym) { return !!this.getClosedMonths()[`${trainerId}_${ym}`]; },

  // Concessions
  getConcessions() { return this.get('concessions', {}); },
  setConcession(trainerId, ym, val) {
    const c = this.getConcessions();
    c[`${trainerId}_${ym}`] = val;
    this.set('concessions', c);
  },
  getConcession(trainerId, ym) { return !!this.getConcessions()[`${trainerId}_${ym}`]; },
};

// ============================================================
// UTILS
// ============================================================
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

const MONTHS_DE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTHS_DE_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function formatYM(year, month) { // month 1-12
  return `${year}-${String(month).padStart(2,'0')}`;
}
function parseYM(ym) {
  const [y, m] = ym.split('-');
  return { year: parseInt(y), month: parseInt(m) };
}
function ymLabel(ym) {
  const { year, month } = parseYM(ym);
  return `${MONTHS_DE[month-1]} ${year}`;
}
function calcHours(from, to) { // "HH:MM" strings
  const [fh, fm] = from.split(':').map(Number);
  const [th, tm] = to.split(':').map(Number);
  return Math.max(0, (th * 60 + tm - fh * 60 - fm) / 60);
}
function fmtHours(h) {
  if (h === undefined || h === null || isNaN(h)) return '0,00';
  return h.toFixed(2).replace('.', ',');
}
function getDaysInMonth(year, month) { return new Date(year, month, 0).getDate(); }

// Returns ordered list of YM strings for a fiscal year starting at startMonth (1-12), startYear
function getFiscalYearMonths(startMonth, startYear) {
  const months = [];
  for (let i = 0; i < 12; i++) {
    let m = ((startMonth - 1 + i) % 12) + 1;
    let y = startYear + Math.floor((startMonth - 1 + i) / 12);
    months.push(formatYM(y, m));
  }
  return months;
}

// Determine the current "open" YM for a trainer (oldest unclosed month up to today)
function getCurrentOpenMonth(trainerId) {
  const config = DB.getConfig();
  if (!config) return null;
  const now = new Date();
  const currentYM = formatYM(now.getFullYear(), now.getMonth() + 1);
  // fiscal year start
  let startYear = config.fiscalStartYear;
  let startMonth = config.fiscalStartMonth;
  // generate up to 24 months
  const candidates = [];
  for (let i = 0; i < 24; i++) {
    let m = ((startMonth - 1 + i) % 12) + 1;
    let y = startYear + Math.floor((startMonth - 1 + i) / 12);
    const ym = formatYM(y, m);
    if (ym > currentYM) break;
    candidates.push(ym);
  }
  // find oldest not closed
  for (const ym of candidates) {
    if (!DB.isMonthClosed(trainerId, ym)) return ym;
  }
  return currentYM;
}

function getTotalHoursForTrainerMonth(trainerId, ym) {
  return DB.getEntriesForTrainer(trainerId)
    .filter(e => e.date.startsWith(ym))
    .reduce((s, e) => s + (e.hours || 0), 0);
}

// ============================================================
// STATE
// ============================================================
let state = {
  view: 'loading', // loading | setup | login | trainerDash | adminDash
  loginStep: 'select', // select | trainer | admin
  currentTrainer: null,
  adminLoggedIn: false,
  adminTab: 'hours',
  adminMonth: null,
  notification: null,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ============================================================
// NOTIFICATION
// ============================================================
function notify(msg, type = 'success') {
  state.notification = { msg, type };
  render();
  setTimeout(() => { state.notification = null; render(); }, 3000);
}

// ============================================================
// RENDER DISPATCH
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (state.notification) {
    let existing = document.getElementById('notif-banner');
    if (!existing) {
      existing = document.createElement('div');
      existing.id = 'notif-banner';
      existing.className = 'fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg shadow-lg text-sm font-medium transition-all slide-up';
      document.body.appendChild(existing);
    }
    existing.textContent = state.notification.msg;
    existing.className = `fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg shadow-lg text-sm font-medium slide-up ${state.notification.type === 'error' ? 'bg-red-500 text-white' : 'bg-emerald-600 text-white'}`;
    existing.style.display = 'block';
  } else {
    const existing = document.getElementById('notif-banner');
    if (existing) existing.style.display = 'none';
  }

  switch (state.view) {
    case 'loading': app.innerHTML = renderLoading(); break;
    case 'setup': app.innerHTML = renderSetup(); break;
    case 'login': app.innerHTML = renderLogin(); break;
    case 'trainerDash': app.innerHTML = renderTrainerDash(); break;
    case 'adminDash': app.innerHTML = renderAdminDash(); break;
    default: app.innerHTML = renderLogin();
  }
  lucide.createIcons();
  attachEventListeners();
}

  const config = DB.getConfig();
  if (!config) { setState({ view: 'setup' }); }
  else { setState({ view: 'login' }); }
}

// ============================================================
// TRAINER DASHBOARD
// ============================================================
function renderTrainerDash() {
  const trainer = state.currentTrainer;
  if (!trainer) { setState({ view: 'login' }); return ''; }
  const config = DB.getConfig();
  const openYM = getCurrentOpenMonth(trainer.id);
  const { year, month } = parseYM(openYM);
  const entries = DB.getEntriesForTrainer(trainer.id).filter(e => e.date.startsWith(openYM)).sort((a,b) => a.date.localeCompare(b.date));
  const totalHours = entries.reduce((s,e) => s + (e.hours||0), 0);
  const target = config.monthlyHours;
  const pct = Math.min(100, (totalHours / target) * 100);
  const isClosed = DB.isMonthClosed(trainer.id, openYM);
  const daysInMonth = getDaysInMonth(year, month);
  const minDate = `${openYM}-01`;
  const maxDate = `${openYM}-${String(daysInMonth).padStart(2,'0')}`;

  return `
  <div class="min-h-screen bg-gray-50">
    <!-- Header -->
    <div class="accent-bg text-white px-4 py-4 shadow-md">
      <div class="max-w-xl mx-auto flex items-center justify-between">
        <div>
          <div class="text-xs opacity-75">Willkommen,</div>
          <div class="font-bold text-lg leading-tight">${trainer.firstName}</div>
        </div>

          <i data-lucide="log-out" class="w-4 h-4"></i> Abmelden
        </button>
      </div>
    </div>

    <div class="max-w-xl mx-auto px-4 py-5 space-y-4">
      <!-- Month Progress Card -->
      <div class="bg-white rounded-2xl shadow-sm p-5">
        <div class="flex items-center justify-between mb-1">
          <div class="font-semibold text-gray-800">${ymLabel(openYM)}</div>
          ${isClosed ? '<span class="badge badge-gray"><i data-lucide="lock" class="w-3 h-3"></i> Abgeschlossen</span>' : '<span class="badge badge-blue">Offen</span>'}
        </div>
        <div class="text-2xl font-bold accent-text mb-1">${fmtHours(totalHours)} <span class="text-sm font-normal text-gray-400">/ ${fmtHours(target)} Std.</span></div>
        <div class="progress-bar h-3 my-2">
          <div class="progress-fill h-3 ${pct >= 100 ? 'over' : pct < 50 ? 'danger' : ''}" style="width:${pct}%"></div>
        </div>
        <div class="text-xs text-gray-400">${pct >= 100 ? '✓ Ziel erreicht!' : `Noch ${fmtHours(target - totalHours)} Std. bis zum Ziel`}</div>
      </div>

      <!-- Add Entry (only if not closed) -->
      ${!isClosed ? `

            </div>
          </div>`).join('')}
      </div>

      <!-- Close Month Button -->
      ${!isClosed ? `
      <button id="closeMonthBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white py-4 rounded-2xl font-semibold text-sm transition flex items-center justify-center gap-2 shadow-sm">

        <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i> Monat abgeschlossen
      </div>`}
    </div>
  </div>`;
}

function formatDateDE(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${d}.${m}.${y}`;
}

// ---- TAB A: Hours ----
function renderAdminHours() {
  const config = DB.getConfig();
  const trainers = DB.getTrainers();
  const allEntries = DB.getEntries();

  // Collect all YMs that have entries or from fiscal year
  const fiscalMonths = getFiscalYearMonths(config.fiscalStartMonth, config.fiscalStartYear);
  const now = new Date();
  const currentYM = formatYM(now.getFullYear(), now.getMonth()+1);
  const availableMonths = fiscalMonths.filter(ym => ym <= currentYM);
  if (!state.adminMonth || !availableMonths.includes(state.adminMonth)) {
    state.adminMonth = availableMonths[availableMonths.length - 1] || currentYM;
  }
  const selYM = state.adminMonth;

  return `
  <div>
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <h2 class="text-lg font-bold text-gray-900">Stunden-Ansicht</h2>
      <div class="flex items-center gap-2">
        <button onclick="prevMonth()" class="p-2 rounded-xl border border-gray-200 hover:bg-gray-100 transition"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
        <select id="monthSelect" onchange="selectMonth(this.value)" class="border border-gray-200 rounded-xl px-3 py-2 text-sm">
          ${availableMonths.map(ym => `<option value="${ym}" ${ym===selYM?'selected':''}>${ymLabel(ym)}</option>`).join('')}
        </select>
        <button onclick="nextMonth()" class="p-2 rounded-xl border border-gray-200 hover:bg-gray-100 transition"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
      </div>
    </div>

    <div class="space-y-3">
    ${trainers.length === 0 ? `<div class="bg-white rounded-2xl shadow-sm p-8 text-center text-gray-400">Noch keine Trainer angelegt.</div>` :
      trainers.map(trainer => {
        const entries = DB.getEntriesForTrainer(trainer.id).filter(e => e.date.startsWith(selYM)).sort((a,b)=>a.date.localeCompare(b.date));
        const total = entries.reduce((s,e) => s+(e.hours||0), 0);
        const target = config.monthlyHours;
        const reached = total >= target;
        const concession = DB.getConcession(trainer.id, selYM);
        const isClosed = DB.isMonthClosed(trainer.id, selYM);
        const accordionId = `acc_${trainer.id}`;
        return `
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
          <div class="p-4">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="font-semibold text-gray-900">${trainer.firstName} ${trainer.lastName}</span>
                  ${trainer.status === 'paused' ? `<span class="badge badge-orange">Pausiert</span>` : ''}
                  ${isClosed ? `<span class="badge badge-gray"><i data-lucide="lock" class="w-3 h-3 mr-0.5"></i>Abgeschlossen</span>` : ''}
                </div>
                <div class="text-xs text-gray-400 mt-0.5">${trainer.facility}</div>
                <div class="flex items-center gap-3 mt-2">
                  <span class="text-lg font-bold accent-text">${fmtHours(total)}</span>
                  <span class="text-xs text-gray-400">/ ${fmtHours(target)} Std.</span>
                  ${reached ? `<span class="badge badge-green"><i data-lucide="check" class="w-3 h-3"></i> Ziel erreicht</span>`
                    : `<span class="badge badge-red"><i data-lucide="x" class="w-3 h-3"></i> Nicht erreicht</span>`}
                </div>
              </div>
              <button onclick="toggleAccordion('${accordionId}')" class="p-2 rounded-xl hover:bg-gray-100 transition flex-shrink-0">
                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 transition-transform" id="chevron_${accordionId}"></i>
              </button>
            </div>
            ${!reached ? `
            <div class="mt-3 flex items-center gap-3 pt-3 border-t border-gray-50">
              <span class="text-xs text-gray-600">Kulanz / Auszahlung:</span>
              <label class="toggle">
                <input type="checkbox" ${concession?'checked':''} onchange="toggleConcession('${trainer.id}','${selYM}',this.checked)">
                <span class="toggle-slider"></span>
              </label>
              <span class="text-xs ${concession ? 'text-emerald-600 font-medium' : 'text-gray-400'}">${concession ? 'Ja – Kulanz gewährt' : 'Nein'}</span>
            </div>` : ''}
          </div>
          <!-- Accordion -->
          <div class="accordion-content" id="${accordionId}">
            <div class="border-t border-gray-100 px-4 py-3">
              ${entries.length === 0 ? `<p class="text-sm text-gray-400 py-2">Keine Einträge für diesen Monat.</p>` : `
              <table class="w-full text-sm">
                <thead><tr class="text-xs text-gray-400 text-left">
                  <th class="pb-2">Datum</th><th class="pb-2">Von</th><th class="pb-2">Bis</th><th class="pb-2">Std.</th><th class="pb-2 w-20">Aktionen</th>
                </tr></thead>
                <tbody>
                ${entries.map(e => `
                  <tr class="border-t border-gray-50" id="row_${e.id}">
                    <td class="py-2">${formatDateDE(e.date)}</td>
                    <td>${e.from}</td>
                    <td>${e.to}</td>
                    <td class="font-medium accent-text">${fmtHours(e.hours)}</td>
                    <td>
                      <div class="flex gap-1">
                        <button onclick="openEditEntry('${e.id}')" class="p-1 rounded-lg hover:bg-blue-50 text-blue-500 transition"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                        <button onclick="adminDeleteEntry('${e.id}')" class="p-1 rounded-lg hover:bg-red-50 text-red-400 transition"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                      </div>
                    </td>
                  </tr>`).join('')}
                </tbody>
              </table>`}
              <button onclick="openAdminAddEntry('${trainer.id}','${selYM}')" class="mt-3 text-xs accent-text flex items-center gap-1 hover:underline">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> Eintrag hinzufügen
              </button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ---- TAB B: Payroll ----
function renderAdminPayroll() {
  const config = DB.getConfig();
  const fiscalMonths = getFiscalYearMonths(config.fiscalStartMonth, config.fiscalStartYear);
  const now = new Date();
  const currentYM = formatYM(now.getFullYear(), now.getMonth()+1);

  if (!state.adminMonth) state.adminMonth = availableMonths[availableMonths.length-1] || currentYM;
  const selYM = state.adminMonth;
  const trainers = DB.getTrainers();

  const rows = trainers.map(t => {
    const total = getTotalHoursForTrainerMonth(t.id, selYM);
    const reached = total >= config.monthlyHours;
    const concession = DB.getConcession(t.id, selYM);
    return { ...t, total, reached, concession };

  const payrollRows = rows.filter(r => r.reached || r.concession);

  return `
  <div>
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <h2 class="text-lg font-bold text-gray-900">Lohnbuchhaltung</h2>

        ${availableMonths.map(ym => `<option value="${ym}" ${ym===selYM?'selected':''}>${ymLabel(ym)}</option>`).join('')}

      <div class="bg-white rounded-2xl shadow-sm p-5">
        <div class="flex items-center gap-2 mb-3">
          <div class="w-8 h-8 bg-emerald-100 rounded-xl flex items-center justify-center"><i data-lucide="download" class="w-4 h-4 text-emerald-600"></i></div>
          <div>
            <div class="font-semibold text-gray-900 text-sm">Export Lohnbüro</div>
            <div class="text-xs text-gray-400">Nur Trainer mit Auszahlung</div>
          </div>
        </div>
        <p class="text-xs text-gray-500 mb-3">Enthält <strong>${payrollRows.length} Trainer</strong> (Ziel erreicht oder Kulanz gewährt).<br>Spalten: Vorname; Name; Klinik; Gesamtstunden; Auszahlung</p>
        <button onclick="exportPayroll('${selYM}')" class="btn-primary px-4 py-2 rounded-xl text-sm font-medium transition flex items-center gap-2">
          <i data-lucide="file-down" class="w-4 h-4"></i> CSV Lohnbüro herunterladen
        </button>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-5">
        <div class="flex items-center gap-2 mb-3">
          <div class="w-8 h-8 bg-blue-100 rounded-xl flex items-center justify-center"><i data-lucide="download" class="w-4 h-4 text-blue-600"></i></div>
          <div>
            <div class="font-semibold text-gray-900 text-sm">Export Alle</div>
            <div class="text-xs text-gray-400">Vollständige Übersicht</div>
          </div>

        <p class="text-xs text-gray-500 mb-3">Enthält <strong>alle ${allRows.length} Trainer</strong>.<br>Spalten: Einrichtung; Vorname; Name; Status; Gesamtstunden</p>
        <button onclick="exportAll('${selYM}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition flex items-center gap-2">
          <i data-lucide="file-down" class="w-4 h-4"></i> CSV Alle herunterladen
        </button>
      </div>
    </div>

    <!-- Preview Table -->
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <h3 class="font-semibold text-gray-800 mb-3 text-sm">Vorschau – ${ymLabel(selYM)}</h3>
      <div class="table-scroll">
        <table class="matrix-table w-full">
          <thead><tr>
            <th>Vorname</th><th>Name</th><th>Einrichtung</th><th>Stunden</th><th>Ziel?</th><th>Kulanz</th><th>Auszahlung</th>
          </tr></thead>
          <tbody>
          ${rows.map(r => `<tr>
            <td>${r.firstName}</td><td>${r.lastName}</td><td>${r.facility}</td>

            <td>${r.reached ? '<span class="badge badge-green">Ja</span>' : '<span class="badge badge-red">Nein</span>'}</td>

            <td>${(r.reached||r.concession) ? '<span class="badge badge-green">Ja</span>' : '<span class="badge badge-gray">Nein</span>'}</td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

// ---- TAB C: Annual ----
function renderAdminAnnual() {
  const config = DB.getConfig();
  const fiscalMonths = getFiscalYearMonths(config.fiscalStartMonth, config.fiscalStartYear);
  const now = new Date();
  const currentYM = formatYM(now.getFullYear(), now.getMonth()+1);
  const trainers = DB.getTrainers();
  const target = config.monthlyHours;
  const yearTarget = target * 12;

  return `
  <div>
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <div>
        <h2 class="text-lg font-bold text-gray-900">Jahresübersicht</h2>
        <p class="text-sm text-gray-400">Fiskaljahr ab ${MONTHS_DE[config.fiscalStartMonth-1]} ${config.fiscalStartYear}</p>
      </div>
      <button onclick="exportAnnual()" class="btn-primary px-4 py-2 rounded-xl text-sm font-medium transition flex items-center gap-2">
        <i data-lucide="file-down" class="w-4 h-4"></i> Jahr Export (CSV)
      </button>
    </div>
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="table-scroll p-0">
        <table class="matrix-table">
          <thead>
            <tr>
              <th class="sticky left-0 bg-gray-50 z-10 min-w-32">Name</th>
              ${fiscalMonths.map(ym => `<th class="${ym > currentYM ? 'text-gray-300' : ''}">${MONTHS_DE_SHORT[parseYM(ym).month-1]}<br><span class="font-normal text-gray-400">${parseYM(ym).year}</span></th>`).join('')}
              <th class="bg-teal-50 text-teal-700">Ist</th>
              <th class="bg-gray-100">Soll</th>
              <th class="bg-gray-100">Diff.</th>
            </tr>
          </thead>
          <tbody>
          ${trainers.map(trainer => {
            let yearTotal = 0;
            const cells = fiscalMonths.map(ym => {
              const h = getTotalHoursForTrainerMonth(trainer.id, ym);
              if (ym <= currentYM) yearTotal += h;
              return { ym, h };
            });
            const diff = yearTotal - yearTarget;
            return `<tr>
              <td class="sticky left-0 bg-white font-medium">
                ${trainer.firstName} ${trainer.lastName}
                ${trainer.status==='paused'?'<br><span class="badge badge-orange text-xs">Pausiert</span>':''}
              </td>
              ${cells.map(c => `<td class="${c.ym > currentYM ? 'text-gray-200 bg-gray-50' : c.h > 0 ? 'accent-text font-medium' : 'text-gray-300'}">
                ${c.ym <= currentYM ? fmtHours(c.h) : '–'}
              </td>`).join('')}
              <td class="bg-teal-50 font-bold accent-text">${fmtHours(yearTotal)}</td>
              <td class="bg-gray-50 text-gray-600">${fmtHours(yearTarget)}</td>
              <td class="${diff >= 0 ? 'text-emerald-600 bg-emerald-50' : 'text-red-500 bg-red-50'} font-medium">
                ${diff >= 0 ? '+' : ''}${fmtHours(diff)}
              </td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

// ============================================================
// EVENT LISTENERS
// ============================================================
function attachEventListeners() {
  // Setup Form
  const setupForm = document.getElementById('setupForm');
  if (setupForm) {
    setupForm.addEventListener('submit', e => {
      e.preventDefault();
      const pin = document.getElementById('s_pin').value;
      const pin2 = document.getElementById('s_pin2').value;
      if (pin.length !== 6 || !/^\d{6}$/.test(pin)) { notify('PIN muss 6 Ziffern sein.', 'error'); return; }
      if (pin !== pin2) { notify('PINs stimmen nicht überein.', 'error'); return; }
      const config = {
        monthlyHours: parseFloat(document.getElementById('s_hours').value),
        adminPin: pin,
        fiscalStartMonth: parseInt(document.getElementById('s_startMonth').value),
        fiscalStartYear: parseInt(document.getElementById('s_startYear').value),
      };
      DB.setConfig(config);
      notify('Einrichtung abgeschlossen!');
      setState({ view: 'login' });
    });
  }

  // Trainer Login
  const trainerLoginForm = document.getElementById('trainerLoginForm');
  if (trainerLoginForm) {
    trainerLoginForm.addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('tl_name').value.trim();
      const pin = document.getElementById('tl_pin').value.trim();
      const trainers = DB.getTrainers();
      const trainer = trainers.find(t =>
        `${t.firstName} ${t.lastName}`.toLowerCase() === name.toLowerCase() && t.pin === pin
      );
      if (!trainer) { notify('Name oder PIN falsch.', 'error'); return; }
      if (trainer.status === 'paused') { notify('Ihr Konto ist pausiert. Wenden Sie sich an den Admin.', 'error'); return; }
      setState({ view: 'trainerDash', currentTrainer: trainer });
    });
  }

  // Admin Login
  const adminLoginForm = document.getElementById('adminLoginForm');
  if (adminLoginForm) {
    adminLoginForm.addEventListener('submit', e => {
      e.preventDefault();
      const pin = document.getElementById('al_pin').value.trim();
      const config = DB.getConfig();
      if (pin !== config.adminPin) { notify('Falscher Admin-PIN.', 'error'); return; }
      setState({ view: 'adminDash', adminLoggedIn: true });
    });
  }

  // Logout
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', () => {
      setState({ view: 'login', loginStep: 'select', currentTrainer: null, adminLoggedIn: false });
    });
  }

  // Add Entry Form (Trainer)
  const addEntryForm = document.getElementById('addEntryForm');
  if (addEntryForm) {
    const fromInput = document.getElementById('e_from');
    const toInput = document.getElementById('e_to');
    const preview = document.getElementById('hoursPreview');
    function updatePreview() {
      if (fromInput && toInput && preview) {
        const h = calcHours(fromInput.value, toInput.value);
        preview.textContent = h > 0 ? `= ${fmtHours(h)} Stunden` : 'Ungültige Zeiten';
        preview.className = `text-sm font-medium text-center py-1 ${h > 0 ? 'accent-text' : 'text-red-400'}`;
      }
    }
    fromInput?.addEventListener('change', updatePreview);
    toInput?.addEventListener('change', updatePreview);
    updatePreview();

    addEntryForm.addEventListener('submit', e => {
      e.preventDefault();
      const date = document.getElementById('e_date').value;
      const from = document.getElementById('e_from').value;
      const to = document.getElementById('e_to').value;
      const hours = calcHours(from, to);
      if (hours <= 0) { notify('Endzeit muss nach Startzeit liegen.', 'error'); return; }
      DB.addEntry({ id: uid(), trainerId: state.currentTrainer.id, date, from, to, hours });
      notify('Eintrag gespeichert!');
      setState({ view: 'trainerDash' });
    });
  }

  // Close Month
  const closeMonthBtn = document.getElementById('closeMonthBtn');
  if (closeMonthBtn) {
    closeMonthBtn.addEventListener('click', () => {
      const openYM = getCurrentOpenMonth(state.currentTrainer.id);
      showConfirm(
        'Monat abschließen',
        `${ymLabel(openYM)} wirklich endgültig abschließen? Dieser Vorgang kann nicht rückgängig gemacht werden.`,
        () => {
          DB.closeMonth(state.currentTrainer.id, openYM);
          notify(`${ymLabel(openYM)} wurde abgeschlossen.`);
          setState({ view: 'trainerDash' });
        },
        'Abschließen',
        'bg-teal-600 hover:bg-teal-700'
      );
    });
  }

  // Trainer Form (Admin)
  const trainerForm = document.getElementById('trainerForm');
  if (trainerForm) {
    trainerForm.addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('tm_id').value;
      const pin = document.getElementById('tm_pin').value;
      if (!/^\d{4}$/.test(pin)) { notify('PIN muss genau 4 Ziffern sein.', 'error'); return; }
      const data = {
        firstName: document.getElementById('tm_firstName').value.trim(),
        lastName: document.getElementById('tm_lastName').value.trim(),
        facility: document.getElementById('tm_facility').value.trim(),
        pin,
        status: document.getElementById('tm_status').value,
        phone: document.getElementById('tm_phone').value.trim(),
        email: document.getElementById('tm_email').value.trim(),
        address: document.getElementById('tm_address').value.trim(),
        notes: document.getElementById('tm_notes').value.trim(),
      };
      if (id) {
        DB.updateTrainer(id, data);
        notify('Trainer aktualisiert.');
      } else {
        DB.addTrainer({ id: uid(), ...data });
        notify('Trainer angelegt.');
      }
      closeModal('trainerModal');
      setState({ view: 'adminDash' });
    });
  }

  // Edit Entry Form
  const editEntryForm = document.getElementById('editEntryForm');
  if (editEntryForm) {
    editEntryForm.addEventListener('submit', e => {
      e.preventDefault();
      const id = document.getElementById('ee_id').value;
      const date = document.getElementById('ee_date').value;
      const from = document.getElementById('ee_from').value;
      const to = document.getElementById('ee_to').value;
      const hours = calcHours(from, to);
      if (hours <= 0) { notify('Endzeit muss nach Startzeit liegen.', 'error'); return; }
      DB.updateEntry(id, { date, from, to, hours });
      notify('Eintrag aktualisiert.');
      closeModal('editEntryModal');
      setState({ view: 'adminDash' });
    });
  }

  // Admin Add Entry Form
  const adminAddEntryForm = document.getElementById('adminAddEntryForm');
  if (adminAddEntryForm) {
    adminAddEntryForm.addEventListener('submit', e => {
      e.preventDefault();
      const trainerId = document.getElementById('ae_trainerId').value;
      const date = document.getElementById('ae_date').value;
      const from = document.getElementById('ae_from').value;
      const to = document.getElementById('ae_to').value;
      const hours = calcHours(from, to);
      if (hours <= 0) { notify('Endzeit muss nach Startzeit liegen.', 'error'); return; }
      DB.addEntry({ id: uid(), trainerId, date, from, to, hours });
      notify('Eintrag hinzugefügt.');
      closeModal('adminAddEntryModal');
      setState({ view: 'adminDash' });
    });
  }
}

function switchAdminTab(tab) {
  state.adminTab = tab;
  render();
}
function selectMonth(ym) { state.adminMonth = ym; render(); }
function prevMonth() {
  const config = DB.getConfig();
  const fiscalMonths = getFiscalYearMonths(config.fiscalStartMonth, config.fiscalStartYear);
  const now = new Date();
  const currentYM = formatYM(now.getFullYear(), now.getMonth()+1);
  const avail = fiscalMonths.filter(ym => ym <= currentYM);
  const idx = avail.indexOf(state.adminMonth);
  if (idx > 0) { state.adminMonth = avail[idx-1]; render(); }
}
function nextMonth() {
  const config = DB.getConfig();
  const fiscalMonths = getFiscalYearMonths(config.fiscalStartMonth, config.fiscalStartYear);
  const now = new Date();
  const currentYM = formatYM(now.getFullYear(), now.getMonth()+1);
  const avail = fiscalMonths.filter(ym => ym <= currentYM);
  const idx = avail.indexOf(state.adminMonth);
  if (idx < avail.length - 1) { state.adminMonth = avail[idx+1]; render(); }
}

let confirmCallback = null;

  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  const okBtn = document.getElementById('confirmOkBtn');
  okBtn.textContent = okLabel;
  okBtn.className = `flex-1 text-white py-2.5 rounded-xl text-sm font-semibold transition ${okClass}`;

  document.getElementById('confirmModal').classList.remove('hidden');

  okBtn.onclick = () => {
    closeModal('confirmModal');
    if (confirmCallback) confirmCallback();
  };
}

// ============================================================
// CSV EXPORTS
// ============================================================
function downloadCSV(content, filename) {
  const bom = '﻿'; // BOM for Excel UTF-8
  const blob = new Blob([bom + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportPayroll(ym) {
  const config = DB.getConfig();
  const trainers = DB.getTrainers();
  const rows = trainers
    .map(t => ({ ...t, total: getTotalHoursForTrainerMonth(t.id, ym), concession: DB.getConcession(t.id, ym) }))
    .filter(r => r.total >= config.monthlyHours || r.concession);
  let csv = 'Vorname;Name;Klinik;Gesamtstunden;Auszahlung\n';
  rows.forEach(r => {
    csv += `${r.firstName};${r.lastName};${r.facility};${fmtHours(r.total)};Ja\n`;
  });
  downloadCSV(csv, `Lohnbuero_${ym}.csv`);
  notify('CSV Lohnbüro exportiert.');
}

function exportAll(ym) {
  const config = DB.getConfig();
  const trainers = DB.getTrainers();
  let csv = 'Einrichtung;Vorname;Name;Status;Gesamtstunden\n';
  trainers.forEach(t => {
    const total = getTotalHoursForTrainerMonth(t.id, ym);
    const reached = total >= config.monthlyHours;
    const concession = DB.getConcession(t.id, ym);
    const statusLabel = t.status === 'paused' ? 'Pausiert' : reached ? 'Ziel erreicht' : concession ? 'Kulanz' : 'Nicht erreicht';
    csv += `${t.facility};${t.firstName};${t.lastName};${statusLabel};${fmtHours(total)}\n`;
  });
  downloadCSV(csv, `Alle_Trainer_${ym}.csv`);
  notify('CSV Alle exportiert.');
}

function exportAnnual() {
  const config = DB.getConfig();
  const fiscalMonths = getFiscalYearMonths(config.fiscalStartMonth, config.fiscalStartYear);
  const now = new Date();
  const currentYM = formatYM(now.getFullYear(), now.getMonth()+1);
  const trainers = DB.getTrainers();
  const target = config.monthlyHours;
  const yearTarget = target * 12;

  const monthHeaders = fiscalMonths.map(ym => `${MONTHS_DE_SHORT[parseYM(ym).month-1]} ${parseYM(ym).year}`).join(';');
  let csv = `Name;${monthHeaders};Ist Gesamt;Soll Gesamt;Differenz\n`;

  trainers.forEach(trainer => {
    let yearTotal = 0;
    const cells = fiscalMonths.map(ym => {
      if (ym > currentYM) return '–';
      const h = getTotalHoursForTrainerMonth(trainer.id, ym);
      yearTotal += h;
      return fmtHours(h);
    }).join(';');
    const diff = yearTotal - yearTarget;
    csv += `${trainer.firstName} ${trainer.lastName};${cells};${fmtHours(yearTotal)};${fmtHours(yearTarget)};${diff >= 0 ? '+' : ''}${fmtHours(diff)}\n`;
  });

  downloadCSV(csv, `Jahresuebersicht_${config.fiscalStartYear}.csv`);
  notify('Jahresübersicht exportiert.');
}
