name: Deploy to Firebase (Hosting + Firestore rules)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Firebase service account secret
        shell: bash
        run: |
          if [ -z "$FIREBASE_SA" ]; then
            echo "::error::GitHub Secret FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY fehlt oder ist leer."
            echo "Anlegen unter: Repo → Settings → Secrets and variables → Actions"
            echo "Inhalt: kompletter JSON-Text des privaten Schlüssels (Firebase Console → Projekt → Projekteinstellungen → Dienstkonten → Schlüssel hinzufügen)."
            exit 1
          fi
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}

      - name: Deploy Hosting and Firestore rules
        run: npx firebase-tools@13.35.1 deploy --only hosting,firestore --project drk-facility-dashboard --non-interactive
