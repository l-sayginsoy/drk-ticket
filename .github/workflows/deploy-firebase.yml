# Push auf main: Lint → Build (mit Brevo-Key) → Firebase Hosting
# Secrets: FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY, VITE_BREVO_API_KEY

name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Build
        run: |
          if [ -z "${VITE_BREVO_API_KEY:-}" ]; then
            echo "::error::GitHub Secret VITE_BREVO_API_KEY fehlt — ohne Key kann die App keine Brevo-Mails senden."
            exit 1
          fi
          npm run build
        env:
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}

      - name: Deploy to Firebase (Hosting)
        run: npx firebase-tools@13.35.1 deploy --only hosting --project drk-facility-dashboard --non-interactive
