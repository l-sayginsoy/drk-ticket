# Nach jedem Push auf "main": Build → Firebase Hosting + Cloud Functions
# Secrets: FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY, VITE_BREVO_API_KEY
# Functions-Deploy schlägt ggf. fehl (IAM/Blaze) — Schritt hat continue-on-error; dann lokal: firebase deploy --only functions --project drk-facility-dashboard

name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Build
        run: |
          if [ -z "${VITE_BREVO_API_KEY:-}" ]; then
            echo "::error::GitHub Secret VITE_BREVO_API_KEY ist nicht gesetzt oder leer. Ohne diesen Schlüssel baut Vite keinen Brevo-Key ein — die App sendet dann keine HTML-Mails (sendDrkBrevoMail bricht still ab)."
            exit 1
          fi
          npm run build
        env:
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}

      - name: Deploy to Firebase (Hosting)
        run: npx firebase-tools@13.35.1 deploy --only hosting --project drk-facility-dashboard --non-interactive

      - name: Deploy to Firebase (Cloud Functions)
        continue-on-error: true
        run: npx firebase-tools@13.35.1 deploy --only functions --project drk-facility-dashboard --non-interactive
