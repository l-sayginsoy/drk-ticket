# Nach jedem Push auf "main": Build → Hosting → Brevo-Secret für Functions → Functions
# Secrets: FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY, VITE_BREVO_API_KEY (gleicher Brevo-Key wird als BREVO_API_KEY für Cloud Functions gesetzt)

name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy to Firebase (Hosting)
        run: npx firebase-tools@13.35.1 deploy --only hosting --project drk-facility-dashboard --non-interactive

      - name: Brevo API Key als Functions-Secret (BREVO_API_KEY)
        continue-on-error: true
        run: |
          if [ -z "${VITE_BREVO_API_KEY:-}" ]; then
            echo "::warning::VITE_BREVO_API_KEY fehlt — Cloud Function mailToBrevo kann den Brevo-Key nicht setzen."
            exit 0
          fi
          printf '%s' "$VITE_BREVO_API_KEY" | npx firebase-tools@13.35.1 functions:secrets:set BREVO_API_KEY --project drk-facility-dashboard --data-file=-
        env:
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}

      - name: Deploy to Firebase (Cloud Functions)
        run: npx firebase-tools@13.35.1 deploy --only functions --project drk-facility-dashboard --non-interactive
