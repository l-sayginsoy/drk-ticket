# Push auf main: Lint → Build (mit Brevo-Key) → Firebase Hosting
# Secrets: FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY, VITE_BREVO_API_KEY

name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Build
        run: |
          if [ -z "${VITE_BREVO_API_KEY:-}" ]; then
            echo "::error::GitHub Secret VITE_BREVO_API_KEY fehlt — ohne Key kann die App keine Brevo-Mails senden."
            exit 1
          fi
          npm run build
        env:
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}
          VITE_BREVO_SENDER_EMAIL: ${{ secrets.VITE_BREVO_SENDER_EMAIL }}
          VITE_BREVO_SENDER_NAME: ${{ secrets.VITE_BREVO_SENDER_NAME }}

      - name: Deploy to Firebase Hosting
        run: |
          # Service-Account-Key direkt aus dem Secret in eine Datei schreiben und
          # firebase-tools per Standard-Credentials (ADC) übergeben. Bewusst OHNE
          # google-github-actions/auth (dessen frei laufende v3 hatte das Credential-
          # Format geändert → firebase-tools "Failed to authenticate"). Dieses Muster
          # ist stabil: ein echter SA-Key, den firebase-tools/google-auth-library versteht.
          if [ -z "${FIREBASE_SA:-}" ]; then
            echo "::error::GitHub Secret FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY fehlt oder ist leer."
            exit 1
          fi
          printf '%s' "$FIREBASE_SA" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx firebase-tools@13.35.1 deploy --only hosting --project drk-facility-dashboard --non-interactive
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY }}
