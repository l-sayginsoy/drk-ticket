# Nach jedem Push auf "main": Build → Firebase Hosting + Firestore-Regeln
# Voraussetzung: GitHub Secret FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY (JSON vom Dienstkonto)

name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DRK_FACILITY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}

      - name: Deploy to Firebase
        run: npx firebase-tools@13.35.1 deploy --only hosting,firestore --project drk-facility-dashboard --non-interactive
